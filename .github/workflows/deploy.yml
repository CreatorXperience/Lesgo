name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: local
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        id: backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ lower(github.repository) }}-backend:${{ github.sha }}
            ghcr.io/${{ lower(github.repository) }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        id: frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ lower(github.repository) }}-frontend:${{ github.sha }}
            ghcr.io/${{ lower(github.repository) }}-frontend:latest
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_API_KEY=${{ vars.VITE_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digests
        run: |
          echo "BACKEND_IMAGE=ghcr.io/${{ lower(github.repository) }}-backend:${{ github.sha }}" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${{ lower(github.repository) }}-frontend:${{ github.sha }}" >> $GITHUB_ENV

  deploy:
    needs: build
    runs-on: local
    if: github.event_name != 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          DOCKER_COMPOSE_VERSION=$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          sudo curl -fsSL "https://github.com/docker/compose/releases/download/v${DOCKER_COMPOSE_VERSION}/docker-compose-linux-x86_64" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Set up Docker context
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        run: |
          docker pull "${{ env.BACKEND_IMAGE }}"
          docker pull "${{ env.FRONTEND_IMAGE }}"

      - name: Deploy to Docker Host
        run: |
          docker compose up -d
        env:
          BACKEND_IMAGE: ghcr.io/${{ lower(github.repository) }}-backend:${{ github.sha }}
          FRONTEND_IMAGE: ghcr.io/${{ lower(github.repository) }}-frontend:${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          PORT: 4000